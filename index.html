<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HMC Audit Management System</title>

<meta property="og:title" content="HMC fintrac - Audit Management System">
<meta property="og:description" content="HMC യുടെ  സാമ്പത്തിക ഇടപാടുകൾ ലളിതമായി കൈകാര്യം ചെയ്യൂ.">
<meta property="og:image" content="https://hmc.sumteck.in/logo512.png">
<meta property="og:url" content="https://hmc.sumteck.in">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hmc.sumteck.in/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Inter:wght@400;500&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f3faff;min-height:100vh}
.hidden{display:none!important}

/* LOGIN */
#login-screen{background:#f3faff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-logo{font-family:'Public Sans',sans-serif;font-size:2.2rem;font-weight:700;color:#0040a1;letter-spacing:.08em;margin-bottom:.15rem;text-align:center}
.login-org{font-size:.72rem;color:#5a7ba8;margin-bottom:1.5rem;text-align:center;font-family:'Noto Sans Malayalam','Public Sans',sans-serif}
.user-selector{display:flex;gap:.65rem;margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center}
.user-chip{padding:.4rem 1rem;border-radius:999px;font-size:.78rem;font-family:'Public Sans',sans-serif;font-weight:500;background:#e0eeff;color:#0040a1;cursor:pointer;border:2px solid transparent;transition:all .15s}
.user-chip.active{background:#0040a1;color:#fff}
.pin-display{display:flex;gap:.5rem;margin-bottom:1.4rem;align-items:center}
.pin-dot{width:13px;height:13px;border-radius:50%;background:#c5d9f0;transition:background .15s}
.pin-dot.filled{background:#0040a1}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;width:220px;margin-bottom:1rem}
.key-btn{background:#fff;border:none;border-radius:13px;padding:.85rem 0;font-size:1.05rem;font-family:'Public Sans',sans-serif;font-weight:500;color:#0040a1;cursor:pointer;box-shadow:0 2px 8px rgba(0,64,161,.08);transition:background .1s,transform .1s}
.key-btn:active{background:#e0eeff;transform:scale(.95)}
.key-del{font-size:.8rem;color:#5a7ba8}
.login-hint{font-size:.7rem;color:#8babc8;margin-top:.4rem}
.login-error{font-size:.78rem;color:#c0392b;min-height:1rem;margin-top:.3rem;font-weight:500}

/* DASHBOARD SHELL */
#dashboard-screen{background:#f3faff;min-height:100vh;display:flex;flex-direction:column}
.dash-header{background:#0040a1;padding:.75rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.dash-logo{font-family:'Public Sans',sans-serif;font-size:1rem;font-weight:700;color:#fff;flex:1;text-align:center;line-height:1.25}
.dash-logo small{font-size:.62rem;font-weight:400;opacity:.75;display:block}
.dash-avatar{width:36px;height:36px;border-radius:50%;background:#ffffff28;display:flex;align-items:center;justify-content:center;font-family:'Public Sans',sans-serif;font-size:.72rem;font-weight:600;color:#fff;cursor:pointer;position:relative;flex-shrink:0}
.avatar-badge{position:absolute;bottom:-5px;right:-5px;background:#ffc947;color:#7a4800;font-size:.48rem;font-weight:700;padding:2px 4px;border-radius:4px;white-space:nowrap}
.dash-back{color:#a8c9ff;font-size:.75rem;cursor:pointer;font-family:'Public Sans',sans-serif;flex-shrink:0;white-space:nowrap}
.dash-back:hover{color:#fff}
.tab-bar{background:#fff;display:flex;overflow-x:auto;padding:0 .5rem;scrollbar-width:none;box-shadow:0 2px 10px rgba(0,64,161,.07)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:0 0 auto;padding:.7rem .95rem;font-size:.75rem;font-family:'Public Sans',sans-serif;font-weight:500;color:#5a7ba8;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;position:relative}
.tab-item.active{color:#0040a1;border-bottom:3px solid #0040a1}
.tab-badge{position:absolute;top:6px;right:6px;background:#e24b4a;color:#fff;font-size:.5rem;font-weight:700;border-radius:999px;padding:1px 4px;min-width:14px;text-align:center}
.dash-body{flex:1;padding:1rem;overflow-y:auto}
.workspace-card{background:#fff;border-radius:16px;box-shadow:0 3px 18px rgba(0,64,161,.08);padding:1.2rem;min-height:380px}

/* GENERIC */
.form-title{font-family:'Public Sans',sans-serif;font-size:1rem;font-weight:600;color:#0040a1;margin-bottom:.15rem}
.form-meta{font-size:.7rem;color:#8babc8;margin-bottom:.9rem}
.field-label{font-size:.7rem;font-weight:500;color:#5a7ba8;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.25rem;font-family:'Public Sans',sans-serif}
.field-value{font-size:.85rem;color:#1a2e4a;background:#f3faff;border-radius:8px;padding:.55rem .8rem}
.field-input{font-size:.85rem;color:#1a2e4a;background:#f3faff;border-radius:8px;padding:.55rem .8rem;border:none;width:100%;outline:none}
.field-input:focus{background:#e8f2ff}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.85rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-bottom:.85rem}
.status-pill{padding:.28rem .8rem;border-radius:999px;font-size:.7rem;font-weight:500;font-family:'Public Sans',sans-serif;white-space:nowrap}
.pill-pass{background:#eaf3de;color:#3b6d11}
.pill-review{background:#faeeda;color:#854f0b}
.pill-pending{background:#e0eeff;color:#0040a1}
.pill-rejected{background:#fcebeb;color:#a32d2d}
.section-sep{height:1px;background:#edf4ff;margin:.85rem 0}
.action-row{display:flex;gap:.55rem;margin-top:1rem;flex-wrap:wrap;align-items:center}
.btn-primary{background:#0040a1;color:#fff;border:none;border-radius:10px;padding:.55rem 1.1rem;font-size:.78rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:#e0eeff;color:#0040a1;border:none;border-radius:10px;padding:.55rem 1.1rem;font-size:.78rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer}
.btn-danger{background:#fcebeb;color:#a32d2d;border:none;border-radius:10px;padding:.5rem .9rem;font-size:.75rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer}
.btn-success{background:#eaf3de;color:#3b6d11;border:none;border-radius:10px;padding:.5rem .9rem;font-size:.75rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer}
.btn-print{background:#17443e;color:#fff;border:none;border-radius:10px;padding:.55rem 1.1rem;font-size:.78rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer}
.btn-warn{background:#faeeda;color:#854f0b;border:none;border-radius:10px;padding:.5rem .9rem;font-size:.75rem;font-family:'Public Sans',sans-serif;font-weight:500;cursor:pointer}

/* REGISTER TABLES */
.reg-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.tbl-wrap{overflow-x:auto;border-radius:10px}
.reg-table{width:100%;border-collapse:collapse;font-size:.73rem;font-family:'Inter',sans-serif;min-width:800px}
.reg-table thead tr{background:#0040a1}
.reg-table thead th{color:#fff;font-family:'Noto Sans Malayalam','Public Sans',sans-serif;font-weight:500;padding:.6rem .45rem;text-align:left;white-space:nowrap;font-size:.68rem}
.reg-table tbody tr:nth-child(even){background:#eef6ff}
.reg-table tbody tr:nth-child(odd){background:#fff}
.reg-table tbody td{padding:.25rem .38rem;vertical-align:middle}
.tbl-input{width:100%;border:none;background:transparent;font-size:.72rem;font-family:'Inter',sans-serif;color:#1a2e4a;padding:.22rem .3rem;border-radius:4px;outline:none;min-width:56px}
.tbl-input:focus{background:#ddeeff}
.tbl-input[type="date"]{min-width:108px;font-size:.68rem}
.tbl-del-btn{background:#fcebeb;border:none;border-radius:5px;padding:.2rem .45rem;cursor:pointer;font-size:.68rem;color:#a32d2d;line-height:1}
.tbl-del-btn:hover{background:#f7c1c1}
.grand-total-bar{border-radius:10px;padding:.7rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-top:.8rem}
.gt-income{background:#0040a1}
.gt-expense{background:#6b1a1a}
.gt-label{color:#a8c9ff;font-size:.75rem;font-family:'Public Sans',sans-serif}
.gt-value{color:#fff;font-size:1.05rem;font-weight:600;font-family:'Public Sans',sans-serif}
.save-badge{font-size:.68rem;color:#3b6d11;background:#eaf3de;border-radius:6px;padding:2px 8px;font-family:'Public Sans',sans-serif}

/* WIDE TABLES (F02/F03) */
.f-tbl-wrap{overflow-x:auto;border-radius:10px;-webkit-overflow-scrolling:touch}
.f-tbl-wrap::-webkit-scrollbar{height:5px}
.f-tbl-wrap::-webkit-scrollbar-thumb{background:#a8c9ff;border-radius:3px}
.f02-table,.f03-table{border-collapse:collapse;font-size:.71rem;font-family:'Inter',sans-serif;white-space:nowrap;width:max-content;min-width:800px}
.f02-table thead tr.hdr-top{background:#0040a1}
.f03-table thead tr.hdr-top{background:#6b1a1a}
.f02-table thead tr.hdr-top th,.f03-table thead tr.hdr-top th{color:#fff;font-family:'Noto Sans Malayalam','Public Sans',sans-serif;font-weight:600;padding:.48rem .42rem;text-align:center;font-size:.65rem;border-right:1px solid rgba(255,255,255,.15);line-height:1.3;vertical-align:middle}
.f02-table thead tr.hdr-sub{background:#1a4fbb}
.f03-table thead tr.hdr-sub{background:#8b2a2a}
.f02-table thead tr.hdr-sub th{color:#c8daff;font-family:'Public Sans',sans-serif;font-weight:400;padding:.25rem .42rem;text-align:center;font-size:.6rem;border-right:1px solid rgba(255,255,255,.1)}
.f03-table thead tr.hdr-sub th{color:#ffc8c8;font-family:'Public Sans',sans-serif;font-weight:400;padding:.25rem .42rem;text-align:center;font-size:.6rem;border-right:1px solid rgba(255,255,255,.1)}
.f02-table tbody tr:nth-child(even){background:#eef6ff}
.f02-table tbody tr:nth-child(odd){background:#fff}
.f02-table tbody tr:hover{background:#ddeeff}
.f03-table tbody tr:nth-child(even){background:#fff0f0}
.f03-table tbody tr:nth-child(odd){background:#fff}
.f03-table tbody tr:hover{background:#ffe0e0}
.f02-table tbody td,.f03-table tbody td{padding:.2rem .28rem;vertical-align:middle;border-right:1px solid #ddeeff}
.f-inp{width:100%;border:none;background:transparent;font-size:.71rem;font-family:'Inter',sans-serif;color:#1a2e4a;padding:.2rem .28rem;border-radius:4px;outline:none}
.f02-inp:focus{background:#c8e4ff}
.f03-inp:focus{background:#ffd5c0}
.f-inp[type="date"]{min-width:108px;font-size:.67rem}
.f-inp[type="number"]{min-width:58px;text-align:right}
.f-inp[type="text"]{min-width:68px}
.f02-total-cell{font-weight:700;color:#0040a1;padding:.22rem .45rem;font-size:.72rem;text-align:right;background:#e8f4ff}
.f03-total-cell{font-weight:700;color:#6b1a1a;padding:.22rem .45rem;font-size:.72rem;text-align:right;background:#ffeaea}
.f-del-cell{width:28px;text-align:center}
.f02-table tfoot tr.foot-cols{background:#0a2e7a}
.f03-table tfoot tr.foot-cols{background:#4a0f0f}
.f02-table tfoot tr.foot-cols td,.f03-table tfoot tr.foot-cols td{color:#a8c9ff;font-family:'Public Sans',sans-serif;font-weight:600;padding:.38rem .38rem;font-size:.67rem;text-align:right;border-right:1px solid rgba(255,255,255,.1)}
.f02-table tfoot tr.foot-grand{background:#17443e}
.f03-table tfoot tr.foot-grand{background:#300808}
.f02-table tfoot tr.foot-grand td,.f03-table tfoot tr.foot-grand td{color:#fff;font-family:'Public Sans',sans-serif;font-weight:700;padding:.45rem .45rem;font-size:.73rem}
.f-add-btn-row{margin-top:.6rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.f-scroll-hint{font-size:.65rem;color:#8babc8;font-family:'Public Sans',sans-serif}
.custom-th-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:78px}
.custom-th-row{display:flex;align-items:flex-start;gap:3px;justify-content:center;width:100%}
.col-del-btn{background:rgba(255,70,70,.25);border:none;border-radius:3px;color:#ffaaaa;font-size:.58rem;font-weight:700;cursor:pointer;padding:2px 4px;line-height:1.3;flex-shrink:0}
.col-del-btn:hover{background:rgba(255,70,70,.55);color:#fff}
.f02-custom-col-bg{background:#1a3f60!important}
.f03-custom-col-bg{background:#5c1515!important}
.f02-custom-col-sub{background:#153252!important;color:#90c4e8!important}
.f03-custom-col-sub{background:#4a1010!important;color:#ffb0b0!important}

/* APPROVAL */
.pending-badge{background:#faeeda;color:#854f0b;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:6px;font-family:'Public Sans',sans-serif}
.rejected-row{background:#fff0f0!important;border-left:3px solid #e24b4a}
.rejected-reason{font-size:.65rem;color:#a32d2d;font-style:italic;padding:.15rem .4rem}
.approval-card{background:#f3faff;border-radius:10px;padding:.75rem 1rem;margin-bottom:.6rem;border-left:3px solid #ffc947}
.approval-card.approved-card{border-left-color:#3b6d11;background:#f0faf5}
.approval-card.rejected-card{border-left-color:#e24b4a;background:#fff5f5}

/* FORM 01 CASH BOOK */
.ob-strip{background:#f3faff;border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:.65rem;margin-bottom:.7rem;flex-wrap:wrap}
.ob-input{background:#fff;border:none;border-radius:8px;padding:.4rem .7rem;font-size:.88rem;font-family:'Public Sans',sans-serif;font-weight:600;color:#0040a1;width:120px;outline:none}
.ob-input:focus{background:#e8f2ff}
.cb-wrap{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-top:.7rem}
.cb-panel{background:#f8fcff;border-radius:12px;overflow:hidden}
.cb-panel-hdr{padding:.55rem .9rem;font-family:'Noto Sans Malayalam','Public Sans',sans-serif;font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:space-between}
.cb-receipt-hdr{background:#0040a1;color:#fff}
.cb-payment-hdr{background:#6b1a1a;color:#fff}
.cb-panel-sub{font-size:.6rem;opacity:.75;font-weight:400}
.cb-tbl-scroll{overflow-x:auto}
.cb-tbl-scroll::-webkit-scrollbar{height:4px}
.cb-tbl-scroll::-webkit-scrollbar-thumb{background:#a8c9ff;border-radius:2px}
.cb-table{border-collapse:collapse;font-size:.69rem;font-family:'Inter',sans-serif;white-space:nowrap;width:max-content;min-width:100%}
.cb-table thead th{font-family:'Noto Sans Malayalam','Public Sans',sans-serif;font-weight:600;padding:.42rem .38rem;font-size:.64rem;text-align:center;border-right:1px solid rgba(255,255,255,.15)}
.cb-table thead th:last-child{border-right:none}
.cb-receipt-thead{background:#1a4fbb}
.cb-receipt-thead th{color:#d8eaff}
.cb-payment-thead{background:#8b2a2a}
.cb-payment-thead th{color:#ffd5d5}
.cb-receipt-table tbody tr:nth-child(even){background:#eef6ff}
.cb-receipt-table tbody tr:nth-child(odd){background:#fff}
.cb-payment-table tbody tr:nth-child(even){background:#fff0f0}
.cb-payment-table tbody tr:nth-child(odd){background:#fff}
.cb-table tbody td{padding:.2rem .32rem;vertical-align:middle;border-right:1px solid #e0eeff}
.cb-payment-table tbody td{border-right-color:#ffd5d5}
.cb-table tbody td:last-child{border-right:none}
.cb-inp{width:100%;border:none;background:transparent;font-size:.69rem;font-family:'Inter',sans-serif;color:#1a2e4a;padding:.18rem .26rem;border-radius:3px;outline:none}
.cb-inp:focus{background:#c8e4ff}
.cb-payment-inp:focus{background:#ffd5c0}
.cb-inp[type="date"]{min-width:98px;font-size:.65rem}
.cb-inp[type="number"]{min-width:52px;text-align:right}
.cb-inp[type="text"]{min-width:65px}
.cb-auto-cell{font-size:.69rem;padding:.2rem .38rem;color:#1a2e4a}
.cb-auto-badge{display:inline-block;font-size:.52rem;background:#e0eeff;color:#0040a1;border-radius:3px;padding:1px 3px;font-family:'Public Sans',sans-serif;font-weight:600;margin-left:2px}
.cb-auto-badge-pay{background:#ffe0e0;color:#6b1a1a}
.cb-amount-cell{text-align:right;font-weight:600;color:#0040a1;font-family:'Public Sans',sans-serif;font-size:.7rem}
.cb-amount-cell-pay{text-align:right;font-weight:600;color:#6b1a1a;font-family:'Public Sans',sans-serif;font-size:.7rem}
.cb-del-btn{background:transparent;border:none;color:#c0392b;font-size:.68rem;cursor:pointer;padding:2px 3px;border-radius:3px}
.cb-del-btn:hover{background:#fcebeb}
.cb-foot-row{background:#0a2e7a!important}
.cb-foot-row-pay{background:#4a0f0f!important}
.cb-foot-row td,.cb-foot-row-pay td{color:#fff;font-family:'Public Sans',sans-serif;font-weight:700;padding:.4rem .38rem;font-size:.7rem;text-align:right}
.cb-add-row-strip{padding:.45rem .7rem;display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;border-top:1px solid #ddeeff}
.cb-add-row-strip-pay{border-top-color:#ffd5d5}
.cb-add-btn{background:transparent;border:1.5px dashed #a8c9ff;color:#0040a1;border-radius:7px;padding:.25rem .65rem;font-size:.68rem;font-family:'Public Sans',sans-serif;cursor:pointer}
.cb-add-btn-pay{border-color:#ffaaaa;color:#6b1a1a}
.cb-add-btn:hover{background:#e0eeff}
.cb-add-btn-pay:hover{background:#fff0f0}
.cb-summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-top:.8rem}
.cb-summary-box{border-radius:10px;padding:.65rem .85rem}
.cb-sum-income{background:#eaf3de}
.cb-sum-expense{background:#fcebeb}
.cb-sum-balance{background:#e0eeff}
.cb-sum-lbl{font-size:.67rem;font-family:'Public Sans',sans-serif;font-weight:500}
.cb-sum-val{font-size:.95rem;font-weight:700;font-family:'Public Sans',sans-serif}
.cb-closing-bar{border-radius:12px;padding:.8rem 1.2rem;display:flex;justify-content:space-between;align-items:center;margin-top:.8rem}
.admin-review-section{background:#fff8e8;border-radius:10px;padding:.85rem 1rem;margin-top:.85rem;border-left:3px solid #ffc947}
.admin-review-hdr{font-family:'Public Sans',sans-serif;font-weight:600;font-size:.82rem;color:#7a4800;margin-bottom:.6rem}

/* ADMIN DASHBOARD */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-top:.75rem}
.admin-card{background:#f3faff;border-radius:12px;padding:.85rem 1rem}
.admin-card-title{font-family:'Public Sans',sans-serif;font-weight:600;font-size:.82rem;color:#0040a1;margin-bottom:.65rem;border-bottom:1px solid #ddeeff;padding-bottom:.4rem}
.admin-card-full{grid-column:1/-1}
.user-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .5rem;background:#fff;border-radius:8px;margin-bottom:.4rem;flex-wrap:wrap}
.user-row-info{flex:1;min-width:120px}
.user-row-name{font-size:.78rem;font-weight:500;color:#1a2e4a;font-family:'Public Sans',sans-serif}
.user-row-meta{font-size:.65rem;color:#5a7ba8}
.user-blocked{opacity:.5}
.pin-dots-display{font-size:.68rem;color:#8babc8;letter-spacing:.1em}

/* FORM 04 CHEQUE */
.f04-table{border-collapse:collapse;font-size:.71rem;font-family:'Inter',sans-serif;min-width:900px;width:max-content}
.f04-table thead th{background:#17443e;color:#fff;font-family:'Noto Sans Malayalam','Public Sans',sans-serif;padding:.5rem .42rem;font-size:.65rem;text-align:center;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.f04-table tbody tr:nth-child(even){background:#e8f5f0}
.f04-table tbody tr:nth-child(odd){background:#fff}
.f04-table tbody td{padding:.22rem .3rem;border-right:1px solid #c8e8dc;vertical-align:middle}
.f04-inp{width:100%;border:none;background:transparent;font-size:.71rem;font-family:'Inter',sans-serif;color:#1a2e4a;padding:.2rem .28rem;border-radius:4px;outline:none}
.f04-inp:focus{background:#c8e8dc}
.f04-inp[type="date"]{min-width:105px;font-size:.67rem}
.f04-inp[type="number"]{text-align:right;min-width:68px}
.f04-inp[type="text"]{min-width:75px}
.f04-amount-cell{text-align:right;font-weight:700;color:#17443e;font-family:'Public Sans',sans-serif;font-size:.73rem;background:#e0f5eb}
.f04-foot{background:#17443e!important}
.f04-foot td{color:#fff;font-family:'Public Sans',sans-serif;font-weight:700;padding:.45rem .42rem;font-size:.73rem}

/* FINAL REPORT */
.rpt-wrap{font-family:'Public Sans',sans-serif}
.rpt-org-block{background:#0040a1;border-radius:10px;padding:.9rem 1.4rem;margin-bottom:.7rem;color:#fff;text-align:center}

/* PRINT — Mixed orientation handled via named @page rules:
   .print-portrait  → Final Report tab  → A4 Portrait
   .print-landscape → Forms 01-04       → A4 Landscape
   These classes are added to <body> by printForm() / printFinal() */
@page portrait-page  { size:A4 portrait;  margin:1.2cm 1.4cm }
@page landscape-page { size:A4 landscape; margin:1cm 1.2cm   }

@media print{
  /* ── Global reset ── */
  #login-screen,#toast,.tab-bar,.dash-header,.dash-back,
  .action-row,.no-print,.admin-review-section,
  .pr-filter-card,.pr-action-row,.btn-print,.btn-primary,
  .btn-secondary,.btn-danger,.btn-warn{display:none!important}

  body,#dashboard-screen,.dash-body,.workspace-card{
    background:#fff!important;box-shadow:none!important;
    padding:0!important;margin:0!important;
    min-height:unset!important;border-radius:0!important;
    overflow:visible!important
  }

  /* ── Portrait mode (Final Report) ── */
  body.print-portrait  { page: portrait-page; }
  body.print-portrait .workspace-card { padding:.8cm 1.2cm!important }

  /* ── Landscape mode (Forms 01–04, Print Reports tab) ── */
  body.print-landscape { page: landscape-page; }
  body.print-landscape .workspace-card { padding:.5cm .7cm!important }

  /* ── Force every .pr-form-block onto a fresh page ── */
  .pr-form-block.pr-page-break{page-break-before:always!important;break-before:page!important}
  .pr-form-block{
    box-shadow:none!important;border:1pt solid #bbb;
    margin-bottom:.5cm;overflow:visible!important;
    border-radius:0!important;page-break-inside:auto
  }
  .pr-form-hdr{-webkit-print-color-adjust:exact;print-color-adjust:exact;border-radius:0!important}
  .pr-form-body{overflow:visible!important;padding:.3cm .4cm!important}
  .pr-org-print-hdr{display:block!important}

  /* ── No scrollbars anywhere ── */
  *{overflow:visible!important;max-height:none!important;scrollbar-width:none!important}
  .f-tbl-wrap,.cb-tbl-scroll,.rpt-tbl-scroll,.tbl-wrap{overflow:visible!important}

  /* ── Landscape tables: stretch full width, no min-width clamp ── */
  body.print-landscape .pr-tbl,
  body.print-landscape .f02-table,
  body.print-landscape .f03-table,
  body.print-landscape .cb-table,
  body.print-landscape .f04-table,
  body.print-landscape .reg-table{
    width:100%!important;min-width:unset!important;
    font-size:7.5pt!important;table-layout:auto!important;
    border-collapse:collapse!important;white-space:normal!important
  }
  body.print-landscape .pr-tbl th,
  body.print-landscape .f02-table thead th,
  body.print-landscape .f03-table thead th,
  body.print-landscape .cb-table thead th,
  body.print-landscape .f04-table thead th{
    font-size:7pt!important;padding:3pt 4pt!important;
    background:#f0f0f0!important;color:#000!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
    border:.5pt solid #bbb!important;white-space:normal!important
  }
  body.print-landscape .pr-tbl td,
  body.print-landscape .f02-table tbody td,
  body.print-landscape .f03-table tbody td,
  body.print-landscape .cb-table tbody td,
  body.print-landscape .f04-table tbody td{
    font-size:7.5pt!important;padding:3pt 4pt!important;
    border:.5pt solid #ddd!important;white-space:normal!important
  }
  .pr-grand-row td{background:#e8e8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-closing-strip{background:#e0e0e0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pr-date-banner{background:#e8f4e0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}

  /* ── Portrait: Final Report table ── */
  body.print-portrait .rpt-org-block,
  body.print-portrait .rpt-title-block{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.print-portrait .pr-final-portrait-tbl{
    width:100%!important;border-collapse:collapse!important;font-size:8pt!important
  }
  body.print-portrait .pr-final-portrait-tbl th,
  body.print-portrait .pr-final-portrait-tbl td{
    padding:4pt 5pt!important;border:1pt solid #999!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }

  /* Signature row */
  .pr-sig-print{display:grid!important;grid-template-columns:1fr 1fr 1fr;gap:1.5cm;margin-top:1cm;padding-top:.5cm}
  .rpt-sig-row{display:grid!important;grid-template-columns:1fr 1fr 1fr;gap:2rem;margin-top:2rem;padding-top:.85rem}
}

<script>
'use strict';
/* ══════════════════════════════════════════════════════
   STORAGE HELPERS
══════════════════════════════════════════════════════ */
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsRm(k){try{localStorage.removeItem(k);}catch(e){}}

const LS={
  ORG:'hmc_org_v1', MASTER_PIN:'hmc_master_pin_v1', USERS:'hmc_users_v1',
  F02:'hmc_f02_v5', F02_CUSTOM:'hmc_f02_custom_v2', F02_PENDING:'hmc_f02_pending_v1',
  F03:'hmc_f03_v4', F03_CUSTOM:'hmc_f03_custom_v2', F03_PENDING:'hmc_f03_pending_v1',
  F01_REC:'hmc_f01_rec_v2', F01_PAY:'hmc_f01_pay_v2',
  F04:'hmc_f04_v1', OB:'hmc_ob_v2', OB_TREA:'hmc_ob_trea_v1', OB_BANK:'hmc_ob_bank_v1',
  FINAL_OVERRIDES:'hmc_final_overrides_v1'
};

/* ══════════════════════════════════════════════════════
   ORG PROFILE & USER MANAGEMENT
══════════════════════════════════════════════════════ */
let org = lsGet(LS.ORG, {name:'HMC', adminName:'Admin', designation:'Manager', pen:''});
let masterPin = lsGet(LS.MASTER_PIN, '0000');

/* users: [{id, name, designation, pin, blocked, isAdmin}] */
/* users: [{id,name,designation,pin,blocked,isAdmin,forms:[0-4]}]
   forms indices: 0=Form01,1=Form02,2=Form03,3=Form04,4=FinalReport
   Admin always sees all; forms[] gates tabs for regular users */
let users = lsGet(LS.USERS, [
  {id:'admin',name:'Admin',designation:'Administrator',pin:'1234',blocked:false,isAdmin:true,forms:[0,1,2,3,4,5]}
]);
/* Migrate legacy users that lack forms array */
users.forEach(u=>{ if(!Array.isArray(u.forms)) u.forms = u.isAdmin ? [0,1,2,3,4,5] : [1,2]; });

function saveOrg(){lsSet(LS.ORG,org); applyOrgToUI();}
function saveMasterPin(){lsSet(LS.MASTER_PIN,masterPin);}
function saveUsers(){lsSet(LS.USERS,users);}

function applyOrgToUI(){
  const title = (org.name||'HMC') + ' — Audit Management';
  document.title = title;
  const ll = document.getElementById('login-logo');
  if(ll) ll.textContent = org.name||'HMC';
  const lo = document.getElementById('login-org');
  if(lo) lo.textContent = 'Audit Management System';
  const dl = document.getElementById('dash-logo');
  if(dl) dl.innerHTML = (org.name||'HMC')+'<small>Audit Management System</small>';
}

/* ══════════════════════════════════════════════════════
   AUTH
   isAdmin is ONLY set to true when the logged-in user object
   has isAdmin:true AND their PIN matches. Regular users can
   never reach the Admin tab regardless of what they type.
══════════════════════════════════════════════════════ */
let pin='', currentUser=null, isAdmin=false;

function buildLoginChips(){
  const sel = document.getElementById('user-selector');
  sel.innerHTML='';
  /* Show every non-blocked user (admin is never blocked) */
  users.filter(u => !u.blocked || u.isAdmin).forEach(u=>{
    const d = document.createElement('div');
    d.className = 'user-chip' + (u.id==='admin' ? ' active' : '');
    d.textContent = u.name;
    d.onclick = () => selectUser(d, u.id);
    sel.appendChild(d);
  });
  /* Pre-select first chip */
  if(!currentUser) currentUser = users.find(u=>!u.blocked) || users[0];
  document.getElementById('login-hint').textContent = 'Enter your PIN to continue';
}

function selectUser(el, uid){
  document.querySelectorAll('.user-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentUser = users.find(u=>u.id===uid);
  pin=''; updateDots();
  document.getElementById('login-error').textContent='';
}

function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i<pin.length);
}
function pressKey(k){ if(pin.length>=4) return; pin+=k; updateDots(); if(pin.length===4) setTimeout(checkPin,200); }
function deleteKey(){ pin=pin.slice(0,-1); updateDots(); }
function clearPin(){ pin=''; updateDots(); document.getElementById('login-error').textContent=''; }

function checkPin(){
  if(!currentUser){
    document.getElementById('login-error').textContent='Select a user first.';
    pin=''; updateDots(); return;
  }
  if(currentUser.blocked){
    document.getElementById('login-error').textContent='Account blocked. Contact Admin.';
    pin=''; updateDots(); return;
  }

  /* ── Core login check ──────────────────────────────────────────────────
     isAdmin is ONLY granted when:
       1. The PIN matches this user's stored PIN, AND
       2. The user object itself carries isAdmin:true
     A regular user typing the admin PIN against their own account is
     rejected at step 2 — they simply fail the PIN match at step 1 first.
  ─────────────────────────────────────────────────────────────────────── */
  if(pin !== currentUser.pin){
    document.getElementById('login-error').textContent='Incorrect PIN. Try again.';
    pin=''; setTimeout(updateDots,100); return;
  }

  /* PIN correct — now resolve role */
  isAdmin = (currentUser.isAdmin === true);  /* explicit boolean check */

  /* Transition to dashboard */
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard-screen').classList.remove('hidden');

  const av = document.getElementById('user-avatar');
  av.childNodes[0].textContent = currentUser.name.substring(0,2).toUpperCase();
  av.querySelector('.avatar-badge').textContent = isAdmin ? 'ADMIN' : 'USER';

  /* Admin-only header edit-mode badge */
  const existHint = document.getElementById('admin-edit-hint');
  if(existHint) existHint.remove();
  if(isAdmin){
    const hint = document.createElement('span');
    hint.id='admin-edit-hint'; hint.className='admin-edit-hint no-print';
    hint.textContent='✎ Edit Mode';
    document.querySelector('.dash-header').appendChild(hint);
  }

  /* Build nav tabs appropriate for this user's role & permissions */
  buildTabBar();

  /* Land on the first tab the user is permitted to see */
  const firstTab = document.querySelector('.tab-item');
  const firstIdx = firstTab ? parseInt(firstTab.dataset.idx) : (isAdmin ? 0 : 1);
  switchTabByIdx(firstIdx);
}

function logout(){
  document.getElementById('dashboard-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  /* Fully reset auth state */
  pin=''; currentUser=null; isAdmin=false;
  updateDots();
  document.getElementById('login-error').textContent='';
  buildLoginChips();
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color||'#27500a';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

/* ══════════════════════════════════════════════════════
   FORMATTERS
══════════════════════════════════════════════════════ */
function fmt(n){return '₹'+Math.abs(n).toFixed(2);}
function fmtSigned(n){return (n<0?'−':'')+'₹'+Math.abs(n).toFixed(2);}
function fmtIN(n){return n===0?'—':'₹'+Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ══════════════════════════════════════════════════════
   FINANCIAL YEAR
══════════════════════════════════════════════════════ */
function getFinancialYear(){
  const now=new Date(), m=now.getMonth(), y=now.getFullYear();
  const s=m>=3?y:y-1, e=s+1;
  return {label:`${s}-${String(e).slice(-2)}`, start:s, end:e};
}

/* ══════════════════════════════════════════════════════
   FORM 02 — INCOME REGISTER
══════════════════════════════════════════════════════ */
const F02_FIXED=[
  {key:'gate',   ml:'ഗേറ്റ് പാസ് ടിക്കറ്റ്', en:'Gate Pass Ticket'},
  {key:'op',     ml:'ഒ.പി ടിക്കറ്റ്',        en:'OP Ticket'},
  {key:'ip',     ml:'ഐ.പി വരവ്',             en:'IP Collection'},
  {key:'interest',ml:'പലിശ',                 en:'Interest'},
  {key:'rent',   ml:'വാടക',                  en:'Rent'},
  {key:'other',  ml:'മറ്റ് വരവുകൾ',          en:'Other Receipts'},
];
let f02CustomCols=lsGet(LS.F02_CUSTOM,[]);
function f02AllCols(){return [...F02_FIXED,...f02CustomCols];}

function makeF02(){
  const base={id:Date.now()+Math.random(),date:'',receiptNo:'',remarks:'',status:'draft',rejReason:''};
  f02AllCols().forEach(c=>{base[c.key]='';});
  return base;
}
let f02=lsGet(LS.F02,[makeF02()]);
let f02Pending=lsGet(LS.F02_PENDING,[]); // submitted awaiting admin

function f02Total(e){return f02AllCols().reduce((s,c)=>s+(parseFloat(e[c.key])||0),0);}
function f02Grand(){return [...f02,...f02Pending.filter(e=>e.status==='approved')].reduce((s,e)=>s+f02Total(e),0);}
function f02ColTotal(key){return f02.reduce((s,e)=>s+(parseFloat(e[key])||0),0);}

function onF02Change(id,field,val){
  const e=f02.find(x=>x.id===id); if(!e) return;
  e[field]=val; lsSet(LS.F02,f02);
  const t=f02Total(e);
  const rt=document.getElementById('f02rt-'+id); if(rt) rt.textContent=fmt(t);
  const gt=f02.reduce((s,e)=>s+f02Total(e),0);
  document.querySelectorAll('.f02-gtval').forEach(el=>el.textContent=fmt(gt));
  f02AllCols().forEach(c=>{const el=document.getElementById('f02col-'+c.key); if(el) el.textContent=f02ColTotal(c.key)>0?fmt(f02ColTotal(c.key)):'';});
  _syncAll();
}

function addF02Row(){f02.push(makeF02()); lsSet(LS.F02,f02); renderF02(); showToast('+ New row added');}
function delF02Row(id){
  if(f02.length<=1){showToast('At least one row required.','#7a4800'); return;}
  f02=f02.filter(e=>e.id!==id); lsSet(LS.F02,f02); renderF02();
  /* Auto-update Final Statement if currently visible */
  _syncAll();
}
function addF02CustomCol(){
  const label=prompt('New column name:'); if(!label||!label.trim()) return;
  const key='f02c_'+Date.now();
  f02CustomCols.push({key,ml:label.trim(),en:label.trim()});
  lsSet(LS.F02_CUSTOM,f02CustomCols);
  f02.forEach(e=>{e[key]='';});
  lsSet(LS.F02,f02); renderF02(); showToast('Column added');
}
function delF02CustomCol(key){
  const col=f02CustomCols.find(c=>c.key===key); if(!col) return;
  if(!confirm('Delete column "'+col.ml+'"?')) return;
  f02CustomCols=f02CustomCols.filter(c=>c.key!==key); lsSet(LS.F02_CUSTOM,f02CustomCols);
  f02.forEach(e=>delete e[key]); lsSet(LS.F02,f02); renderF02(); showToast('Column removed.','#6b1a1a');
}

function submitF02(){
  const toSubmit=f02.filter(e=>f02Total(e)>0||e.date);
  if(!toSubmit.length){showToast('No entries to submit.','#7a4800'); return;}
  toSubmit.forEach(e=>{e.status='pending'; f02Pending.push(e);});
  f02=f02.filter(e=>!toSubmit.find(s=>s.id===e.id));
  if(!f02.length) f02=[makeF02()];
  lsSet(LS.F02,f02); lsSet(LS.F02_PENDING,f02Pending);
  updatePendingBadge();
  showToast('✓ Submitted to Admin for approval');
  renderF02();
}

function f02Ni(id,key,val){
  return `<td><input class="f-inp f02-inp" type="number" min="0" step="0.01" value="${val||''}" placeholder="0" oninput="onF02Change(${id},'${key}',this.value)"></td>`;
}
function f02RowHtml(e){
  const id=e.id;
  const isRej=e.status==='rejected';
  const numCells=f02AllCols().map(c=>f02Ni(id,c.key,e[c.key]||'')).join('');
  return `<tr class="${isRej?'rejected-row':''}">
    <td><input class="f-inp f02-inp" type="date" value="${e.date||''}" oninput="onF02Change(${id},'date',this.value)"></td>
    <td><input class="f-inp f02-inp" type="text" value="${e.receiptNo||''}" placeholder="R-001" oninput="onF02Change(${id},'receiptNo',this.value)"></td>
    ${numCells}
    <td class="f02-total-cell" id="f02rt-${id}">${fmt(f02Total(e))}</td>
    <td><input class="f-inp f02-inp" type="text" value="${e.remarks||''}" placeholder="—" oninput="onF02Change(${id},'remarks',this.value)" style="min-width:75px"></td>
    <td class="f-del-cell"><button class="tbl-del-btn" onclick="delF02Row(${id})">✕</button></td>
    ${isRej?`<td colspan="1" class="rejected-reason">Rejected: ${e.rejReason||'See Admin'}</td>`:''}
  </tr>`;
}

function renderF02(){
  const ws=document.getElementById('workspace');
  const gt=f02.reduce((s,e)=>s+f02Total(e),0);
  const allCols=f02AllCols();
  const fixedThTop=F02_FIXED.map(c=>`<th style="min-width:72px">${c.ml}</th>`).join('');
  const customThTop=f02CustomCols.map(c=>`<th class="f02-custom-col-bg" style="min-width:80px">
    <div class="custom-th-wrap"><div class="custom-th-row"><span style="flex:1;text-align:center">${c.ml}</span>
    <button class="col-del-btn" onclick="delF02CustomCol('${c.key}')">✕</button></div>
    <span style="font-size:.55rem;opacity:.65">Custom</span></div></th>`).join('');
  const fixedThSub=F02_FIXED.map(c=>`<th>${c.en}</th>`).join('');
  const customThSub=f02CustomCols.map(()=>`<th class="f02-custom-col-sub"></th>`).join('');
  const footCols=allCols.map(c=>{const ct=f02ColTotal(c.key); return `<td id="f02col-${c.key}" style="text-align:right">${ct>0?fmt(ct):''}</td>`;}).join('');
  const rejRows=f02.filter(e=>e.status==='rejected');
  const pendCount=f02Pending.filter(e=>e.status==='pending').length;
  ws.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-bottom:.15rem">
      <div><div class="form-title">ഫോറം 02 — വരവ് രജിസ്റ്റർ <span style="font-size:.78rem;font-weight:400">(Income Register)</span></div>
      <div style="font-size:.62rem;color:#8babc8;margin-top:1px">${F02_FIXED.length} fixed + ${f02CustomCols.length} custom columns</div></div>
      <span class="status-pill pill-pending">Pending</span></div>
    <div class="form-meta">Section B · Financial Records · ₹ (INR) · Changes auto-saved</div>
    ${pendCount?`<div style="background:#faeeda;border-radius:8px;padding:.5rem .85rem;margin-bottom:.65rem;font-size:.75rem;color:#854f0b;font-family:'Public Sans',sans-serif">⏳ ${pendCount} row(s) awaiting Admin approval</div>`:''}
    ${rejRows.length?`<div style="background:#fcebeb;border-radius:8px;padding:.5rem .85rem;margin-bottom:.65rem;font-size:.75rem;color:#a32d2d;font-family:'Public Sans',sans-serif">⚠ ${rejRows.length} row(s) rejected — highlighted below. Correct and re-submit.</div>`:''}
    <div class="reg-toolbar">
      <span style="font-size:.75rem;color:#5a7ba8">${f02.length} row(s) in draft</span>
      <div style="display:flex;gap:.45rem;flex-wrap:wrap;align-items:center">
        <span class="save-badge">✓ Auto-saved</span>
        <button class="btn-secondary" onclick="lsSet(LS.F02,f02);showToast('Saved — Form 02')">Save</button>
        <button class="btn-danger" onclick="if(confirm('Clear draft?')){f02=[makeF02()];lsSet(LS.F02,f02);renderF02();}">Clear</button>
      </div></div>
    <div class="f-tbl-wrap">
      <table class="f02-table">
        <thead>

}

function addF03CustomCol(){
  const label=prompt('New expense column name:'); if(!label||!label.trim()) return;
  const key='f03c_'+Date.now();
  f03CustomCols.push({key,ml:label.trim(),en:label.trim()});
  lsSet(LS.F03_CUSTOM,f03CustomCols);
  f03.forEach(e=>{e[key]='';});
  lsSet(LS.F03,f03); renderF03(); showToast('Column added');
}
function delF03CustomCol(key){
  const col=f03CustomCols.find(c=>c.key===key); if(!col) return;
  if(!confirm('Delete column "'+col.ml+'"?')) return;
  f03CustomCols=f03CustomCols.filter(c=>c.key!==key); lsSet(LS.F03_CUSTOM,f03CustomCols);
  f03.forEach(e=>delete e[key]); lsSet(LS.F03,f03); renderF03(); showToast('Column removed.','#6b1a1a');

function submitF03(){
  const toSubmit=f03.filter(e=>f03Total(e)>0||e.date);
  if(!toSubmit.length){showToast('No entries to submit.','#7a4800'); return;}
  toSubmit.forEach(e=>{e.status='pending'; f03Pending.push(e);});
  f03=f03.filter(e=>!toSubmit.find(s=>s.id===e.id));
  if(!f03.length) f03=[makeF03()];

let f01ManualRec=lsGet(LS.F01_REC,[]);
let f01ManualPay=lsGet(LS.F01_PAY,[]);
/* Admin can exclude specific auto-rows (identified by date+desc key) */
let f01ExcludedRec=lsGet('hmc_f01_excl_rec_v1',[]);
let f01ExcludedPay=lsGet('hmc_f01_excl_pay_v1',[]);
function makeManualRec(){return {id:Date.now()+Math.random(),date:'',desc:'',cash:'',treasury:'',bank:''};}
function makeManualPay(){return {id:Date.now()+Math.random(),date:'',voucher:'',desc:'',cash:'',treasury:'',bank:'',checkNo:'',remarks:''};}
function manualRecTotal(r){return (parseFloat(r.cash)||0)+(parseFloat(r.treasury)||0)+(parseFloat(r.bank)||0);}
function manualPayTotal(p){return (parseFloat(p.cash)||0)+(parseFloat(p.treasury)||0)+(parseFloat(p.bank)||0);}

function buildAutoReceipts(){
  const rows=[];
  const approved=f02Pending.filter(e=>e.status==='approved');
  approved.forEach(e=>{
    f02AllCols().forEach(c=>{
      const val=parseFloat(e[c.key])||0;
      if(val) rows.push({date:e.date||'',desc:c.ml,cash:val,source:'F02',entryId:e.id,colKey:c.key});
    });
  });
  return rows.filter(r=>!f01ExcludedRec.includes(r.date+'|'+r.desc+'|'+r.cash));
}
function buildAutoPayments(){
  const rows=[];
  const approved=f03Pending.filter(e=>e.status==='approved');
  approved.forEach(e=>{
    f03AllCols().forEach(c=>{
      const val=parseFloat(e[c.key])||0;
      if(val) rows.push({date:e.date||'',voucher:e.voucher||'',desc:c.ml,cash:val,source:'F03',entryId:e.id,colKey:c.key});
    });
  });
  return rows.filter(p=>!f01ExcludedPay.includes(p.date+'|'+p.voucher+'|'+p.desc+'|'+p.cash));
}

function onF01RecChange(id,field,val){
  const r=f01ManualRec.find(x=>x.id===id); if(!r) return;
  r[field]=val; lsSet(LS.F01_REC,f01ManualRec);
  _syncAll();
}
function onF01PayChange(id,field,val){
  const p=f01ManualPay.find(x=>x.id===id); if(!p) return;
  p[field]=val; lsSet(LS.F01_PAY,f01ManualPay);
  _syncAll();
}
function addF01ManualRec(){f01ManualRec.push(makeManualRec()); lsSet(LS.F01_REC,f01ManualRec); renderF01();}
function delF01ManualRec(id){f01ManualRec=f01ManualRec.filter(r=>r.id!==id); lsSet(LS.F01_REC,f01ManualRec); renderF01(); _syncAll();}
function addF01ManualPay(){f01ManualPay.push(makeManualPay()); lsSet(LS.F01_PAY,f01ManualPay); renderF01();}
function delF01ManualPay(id){f01ManualPay=f01ManualPay.filter(p=>p.id!==id); lsSet(LS.F01_PAY,f01ManualPay); renderF01(); _syncAll();}
function onObChange(field,val){lsSet(LS[field],parseFloat(val)||0); _syncAll();}

/* Admin: exclude an auto-receipt row by index */
function delAutoRec(idx){
  const ar=buildAutoReceipts();
  const r=ar[idx]; if(!r) return;
  const key=r.date+'|'+r.desc+'|'+r.cash;
  if(!f01ExcludedRec.includes(key)) f01ExcludedRec.push(key);
  lsSet('hmc_f01_excl_rec_v1',f01ExcludedRec); renderF01(); _syncAll();
}
/* Admin: exclude an auto-payment row by index */
function delAutoPay(idx){
  const ap=buildAutoPayments();
  const p=ap[idx]; if(!p) return;
  const key=p.date+'|'+p.voucher+'|'+p.desc+'|'+p.cash;
  if(!f01ExcludedPay.includes(key)) f01ExcludedPay.push(key);
  lsSet('hmc_f01_excl_pay_v1',f01ExcludedPay); renderF01(); _syncAll();
}

/* Save Final Statement manual overrides from contentEditable cells */
function saveFinalOverrides(){
  const overrides={};
  document.querySelectorAll('[data-final-key]').forEach(el=>{
    overrides[el.dataset.finalKey]=el.innerText.trim();
  });
  lsSet(LS.FINAL_OVERRIDES,overrides);
  showToast('✓ Final Statement saved');
}

/* Save F01 manual entries + capture any admin contentEditable edits */
function saveF01ManualEntries(){
  /* Capture contentEditable cell edits made in admin mode */
  document.querySelectorAll('[data-ce-rec]').forEach(el=>{
    const parts=el.dataset.ceRec.split('|'); // id|field
    const r=f01ManualRec.find(x=>String(x.id)===parts[0]);
    if(r) r[parts[1]]=el.innerText.trim();
  });
  document.querySelectorAll('[data-ce-pay]').forEach(el=>{
    const parts=el.dataset.cePay.split('|');
    const p=f01ManualPay.find(x=>String(x.id)===parts[0]);
    if(p) p[parts[1]]=el.innerText.trim();
  });
  lsSet(LS.F01_REC,f01ManualRec);
  lsSet(LS.F01_PAY,f01ManualPay);
  showToast('✓ Manual entries saved');
}

function refreshF01Totals(){
  const ob0=parseFloat(lsGet(LS.OB,0))||0;
  const obT=parseFloat(lsGet(LS.OB_TREA,0))||0;
  const obB=parseFloat(lsGet(LS.OB_BANK,0))||0;
  const ar=buildAutoReceipts(), ap=buildAutoPayments();
  const totRec=(ob0+obT+obB)+ar.reduce((s,r)=>s+r.cash,0)+f01ManualRec.reduce((s,r)=>s+manualRecTotal(r),0);
  const totPay=ap.reduce((s,p)=>s+p.cash,0)+f01ManualPay.reduce((s,p)=>s+manualPayTotal(p),0);
  const closing=totRec-totPay;
  const elTR=document.getElementById('cb-total-rec'),elTP=document.getElementById('cb-total-pay'),elCL=document.getElementById('cb-closing'),elBar=document.getElementById('cb-closing-bar');
  if(elTR) elTR.textContent=fmt(totRec);
  if(elTP) elTP.textContent=fmt(totPay);
  if(elCL){elCL.textContent=fmtSigned(closing); elCL.style.color=closing<0?'#ffaaaa':'#fff';}
  if(elBar) elBar.style.background=closing<0?'#6b1a1a':'#0040a1';
}

  const ws=document.getElementById('workspace');

  const closing=totalRec-totalPay;

  /* Pending admin review */
  const p2=f02Pending.filter(e=>e.status==='pending');

  const adminReviewHtml=isAdmin&&(p2.length||p3.length)?`

            <button class="btn-success" onclick="approveF02Entry(${e.id})">✓ Approve</button>
            <button class="btn-danger" onclick="rejectF02Entry(${e.id})">✕ Reject</button>
          </div></div></div>`).join('')}

function cbI(id,field,val,type,ph,isPay){
  const cls=isPay?'cb-inp cb-payment-inp':'cb-inp';
  const fn=isPay?'onF01PayChange':'onF01RecChange';
  const numA=type==='number'?'min="0" step="0.01"':'';
  return `<input class="${cls}" type="${type}" ${numA} value="${val||''}" placeholder="${ph||''}" oninput="${fn}(${id},'${field}',this.value)">`;
}

function makeF04(){
  return {id:Date.now()+Math.random(),sl:'',dateRec:'',fromWhom:'',purpose:'',chequeNo:'',amount:'',initials:'',dateSent:'',dateRealised:''};
}
let f04=lsGet(LS.F04,[makeF04()]);

function onF04Change(id,field,val){
  const e=f04.find(x=>x.id===id); if(!e) return;
  e[field]=val; lsSet(LS.F04,f04);
  if(field==='amount'){
    const gt=f04.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    document.querySelectorAll('.f04-gtval').forEach(el=>el.textContent=fmt(gt));
  }
}
function addF04Row(){f04.push(makeF04()); lsSet(LS.F04,f04); renderF04(); showToast('+ Row added to Cheque Register');}
function delF04Row(id){
  if(f04.length<=1){showToast('At least one row required.','#7a4800'); return;}
  f04=f04.filter(e=>e.id!==id); lsSet(LS.F04,f04); renderF04();
}
function f04I(id,field,val,type,ph){
  const numA=type==='number'?'min="0" step="0.01"':'';
  return `<input class="f04-inp" type="${type}" ${numA} value="${val||''}" placeholder="${ph||''}" oninput="onF04Change(${id},'${field}',this.value)">`;
}

function formPermCheckboxes(uid, userForms, prefix){
  /* Build the 5 permission checkboxes for a user row or new-user form */
  const defs=[
    [0,'Form 01 — Cash Book'],
    [1,'Form 02 — Income Register'],
    [2,'Form 03 — Expenditure Register'],
    [3,'Form 04 — Cheque Register'],
    [4,'Final Report'],
    [5,'Print Reports (🖨)'],
  ];
  return defs.map(([fi,lbl])=>{
    const cbId = prefix+'-'+fi;
    const checked = userForms.includes(fi) ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:#1a2e4a;margin-bottom:.3rem;cursor:pointer">
      <input type="checkbox" id="${cbId}" ${checked} style="width:14px;height:14px;accent-color:#0040a1"> ${lbl}
    </label>`;
  }).join('');
}

function addNewUser(){
  const name=document.getElementById('new-user-name').value.trim();
  const desig=document.getElementById('new-user-desig').value.trim();
  const upin=document.getElementById('new-user-pin').value.trim();
  if(!name||upin.length<4){showToast('Name required and PIN ≥ 4 digits.','#7a4800'); return;}

/* Save form permissions for an existing user */
function saveUserForms(uid){
  const u=users.find(x=>x.id===uid); if(!u||u.isAdmin) return;
  const formsChecked=[];
  [0,1,2,3,4].forEach(i=>{
    const cb=document.getElementById('uf-'+uid+'-'+i);
    if(cb&&cb.checked) formsChecked.push(i);
  });
  u.forms=formsChecked;
  saveUsers(); showToast('✓ Permissions saved for '+u.name);
}
function toggleBlockUser(uid){
  const u=users.find(x=>x.id===uid); if(!u||u.isAdmin) return;
  u.blocked=!u.blocked; saveUsers(); buildLoginChips(); renderAdmin();
  showToast(u.blocked?'User blocked':'User unblocked');
}
function deleteUser(uid){
  if(!confirm('Delete this user account?')) return;
  users=users.filter(u=>u.id!==uid); saveUsers(); buildLoginChips(); renderAdmin();
  showToast('User deleted.','#6b1a1a');
}

   FINAL REPORT — AUDITED FINANCIAL STATEMENT

function aggregateF01(){
  const ob0=parseFloat(lsGet(LS.OB,0))||0;
  const obT=parseFloat(lsGet(LS.OB_TREA,0))||0;
  const obB=parseFloat(lsGet(LS.OB_BANK,0))||0;
  const recMap={}, payMap={};
  if(ob0||obT||obB) recMap['ആരംഭ ബാക്കി (Opening Balance)']={cash:ob0,treasury:obT,bank:obB};
  buildAutoReceipts().forEach(r=>{
    const k=r.desc||'Miscellaneous';
    if(!recMap[k]) recMap[k]={cash:0,treasury:0,bank:0};
    recMap[k].cash+=r.cash||0;
  });
  f01ManualRec.forEach(r=>{
    const k=r.desc||'Manual Receipt';
    if(!recMap[k]) recMap[k]={cash:0,treasury:0,bank:0};
    recMap[k].cash+=parseFloat(r.cash)||0; recMap[k].treasury+=parseFloat(r.treasury)||0; recMap[k].bank+=parseFloat(r.bank)||0;
  });
  buildAutoPayments().forEach(p=>{
    const k=p.desc||'Miscellaneous';
    if(!payMap[k]) payMap[k]={cash:0,treasury:0,bank:0};
    payMap[k].cash+=p.cash||0;
  });
  f01ManualPay.forEach(p=>{
    const k=p.desc||'Manual Payment';
    if(!payMap[k]) payMap[k]={cash:0,treasury:0,bank:0};
    payMap[k].cash+=parseFloat(p.cash)||0; payMap[k].treasury+=parseFloat(p.treasury)||0; payMap[k].bank+=parseFloat(p.bank)||0;
  });
  return {recMap,payMap};
}

  const {recMap,payMap}=aggregateF01();
  const recKeys=Object.keys(recMap), payKeys=Object.keys(payMap);
  const maxRows=Math.max(recKeys.length,payKeys.length,1);
  const a=n=>n===0?'—':'₹'+Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

  /* Load any admin-saved overrides — but purge keys for rows that no
     longer exist so deleted data never haunts the Final Statement */
  let ovr=lsGet(LS.FINAL_OVERRIDES,{});
  const validKeys=new Set();
  for(let i=0;i<maxRows;i++){
    ['rk-desc-','rk-cash-','rk-trea-','rk-bank-','rk-grand-',
     'pk-desc-','pk-cash-','pk-trea-','pk-bank-','pk-grand-'].forEach(pfx=>validKeys.add(pfx+i));
  }
  ['clos-cash','clos-trea','clos-bank','clos-total'].forEach(k=>validKeys.add(k));
  const purged=Object.fromEntries(Object.entries(ovr).filter(([k])=>validKeys.has(k)));
  if(Object.keys(purged).length!==Object.keys(ovr).length){
    ovr=purged; lsSet(LS.FINAL_OVERRIDES,ovr);
  }

  const totRC=recKeys.reduce((s,k)=>s+recMap[k].cash,0);
  const totRT=recKeys.reduce((s,k)=>s+recMap[k].treasury,0);
  const totRB=recKeys.reduce((s,k)=>s+recMap[k].bank,0);
  const totRec=totRC+totRT+totRB;
  const totPC=payKeys.reduce((s,k)=>s+payMap[k].cash,0);
  const totPT=payKeys.reduce((s,k)=>s+payMap[k].treasury,0);
  const totPB=payKeys.reduce((s,k)=>s+payMap[k].bank,0);

  const closC=totRC-totPC, closT=totRT-totPT, closB=totRB-totPB, closing=closC+closT+closB;

  /* Returns a <td> — admin gets contentEditable with override support, others get plain.
     On blur the new value is captured and persisted to FINAL_OVERRIDES automatically. */
  function fce(key, computed, extraCls, extraStyle){
    const val = (ovr[key]!==undefined) ? ovr[key] : computed;
    const cls = extraCls||'';
    const sty = extraStyle ? ` style="${extraStyle}"` : '';
    if(isAdmin){
      return `<td class="${cls}" contenteditable="true" data-final-key="${key}"${sty} title="Admin: click to edit — auto-saved on blur"
        onblur="(function(el){var cur=lsGet(LS.FINAL_OVERRIDES,{});if(el.innerText.trim()){cur[el.dataset.finalKey]=el.innerText.trim();}else{delete cur[el.dataset.finalKey];}lsSet(LS.FINAL_OVERRIDES,cur);showToast('✓ Cell saved','#0a5c3a');})(this)">${val}</td>`;
    }
    return `<td class="${cls}"${sty}>${val}</td>`;
  }

  let bodyRows='';
  for(let i=0;i<maxRows;i++){
    const rk=recKeys[i], pk=payKeys[i];
    const rv=rk?recMap[rk]:null, pv=pk?payMap[pk]:null;
    const rG=rv?rv.cash+rv.treasury+rv.bank:0, pG=pv?pv.cash+pv.treasury+pv.bank:0;
    bodyRows+=`<tr>
      <td class="rpt-sl">${i+1}</td>
      ${fce('rk-desc-'+i, rk||'', 'rpt-desc')}
      ${fce('rk-cash-'+i, rv?a(rv.cash):'', 'rpt-rec-cell')}
      ${fce('rk-trea-'+i, rv?a(rv.treasury):'', 'rpt-rec-cell')}
      ${fce('rk-bank-'+i, rv?a(rv.bank):'', 'rpt-rec-cell')}
      ${fce('rk-grand-'+i, rv&&rG?a(rG):'', 'rpt-grand-cell', 'background:#f0faf5;color:#174c38')}
      <td class="rpt-sl">${pk?i+1:''}</td>
      ${fce('pk-desc-'+i, pk||'', 'rpt-desc')}
      ${fce('pk-cash-'+i, pv?a(pv.cash):'', 'rpt-pay-cell')}
      ${fce('pk-trea-'+i, pv?a(pv.treasury):'', 'rpt-pay-cell')}
      ${fce('pk-bank-'+i, pv?a(pv.bank):'', 'rpt-pay-cell')}
      ${fce('pk-grand-'+i, pv&&pG?a(pG):'', 'rpt-grand-cell', 'background:#fff5f0;color:#6b1a1a')}
      <td style="color:#8babc8;font-size:.62rem;text-align:center"></td>
    </tr>`;
  }
  bodyRows+=`<tr class="rpt-closing-row">
    <td colspan="6" style="text-align:right">അന്തിമ ബാക്കി — Closing Balance c/d</td>
    <td></td><td style="color:#ffd5d5;font-style:italic;font-size:.68rem">Balance</td>
    ${fce('clos-cash', a(closC), '', 'text-align:right')}
    ${fce('clos-trea', a(closT), '', 'text-align:right')}
    ${fce('clos-bank', a(closB), '', 'text-align:right')}
    ${fce('clos-total', a(closing), '', 'text-align:right;font-weight:700')}
    <td></td>
  </tr>`;

  const adminEditBanner = isAdmin ? `
    <div class="no-print" style="background:#fff8e8;border:1px dashed #ffc947;border-radius:8px;padding:.5rem .85rem;margin-bottom:.65rem;font-size:.75rem;color:#7a4800;font-family:'Public Sans',sans-serif;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap">

      ${Object.keys(ovr).length?`<span style="background:#faeeda;border-radius:5px;padding:2px 7px;font-size:.68rem">${Object.keys(ovr).length} override(s) active</span>`:''}
    </div>` : '';

  ws.innerHTML=`
    <div class="rpt-wrap">

        <div class="rpt-org-name">${org.name||'HMC'}</div>

            </tr>

              <th class="rpt-th-rec-sub">Cash (₹)</th><th class="rpt-th-rec-sub">Treasury (₹)</th><th class="rpt-th-rec-sub">Bank (₹)</th>

            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
          <tfoot>
            <tr class="rpt-foot-row">
              <td colspan="2" style="text-align:right">ആകെ — Grand Total Receipts</td>
              <td style="text-align:right">${a(totRC)}</td><td style="text-align:right">${a(totRT)}</td><td style="text-align:right">${a(totRB)}</td>

                Payment + Balance = ${a(totPay + Math.abs(closing))}

/* Active mode tracker */
let _prMode = 'daily';
function prSetMode(mode){
  _prMode = mode;
  ['daily','monthly','fy'].forEach(m=>{
    document.getElementById('pr-panel-'+m).classList.toggle('active', m===mode);
    document.getElementById('pr-mode-'+m).classList.toggle('active', m===mode);

function runPrintSearch(){
  const preview  = document.getElementById('pr-preview');
  const printBtn = document.getElementById('pr-print-btn');
  if(!preview) return;

  /* ── Build date filter based on mode ── */
  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
  let dateLabel = '';
  let dateMatches;  /* function(dateStr) → bool */

  if(_prMode === 'daily'){
    const d = document.getElementById('pr-daily-date').value;
    if(!d){ showToast('Please select a date.','#7a4800'); return; }
    dateLabel = d;
    dateMatches = s => !!s && s === d;

  } else if(_prMode === 'monthly'){
    const m  = document.getElementById('pr-m-month').value;
    const y  = document.getElementById('pr-m-year').value;
    const prefix = `${y}-${m}`;
    dateLabel = monthNames[parseInt(m,10)-1] + ' ' + y;
    dateMatches = s => !!s && s.startsWith(prefix);

  } else { /* fy */
    const fyStart = parseInt(document.getElementById('pr-fy-year').value, 10);
    const fyEnd   = fyStart + 1;
    /* FY: April 1 fyStart → March 31 fyEnd */
    const fyFrom = `${fyStart}-04-01`;
    const fyTo   = `${fyEnd}-03-31`;
    dateLabel = `FY ${fyStart}-${String(fyEnd).slice(-2)} (Apr ${fyStart} – Mar ${fyEnd})`;
    dateMatches = s => {
      if(!s) return false;
      return s >= fyFrom && s <= fyTo;
    };
  }

  /* ── Which forms to include ── */
  const incF01 = document.getElementById('pr-inc-f01').checked;
  const incF02 = document.getElementById('pr-inc-f02').checked;
  const incF03 = document.getElementById('pr-inc-f03').checked;
  const incF04 = document.getElementById('pr-inc-f04').checked;
  const incFin = document.getElementById('pr-inc-fin').checked;

  /* ── Format helper ── */
  const fmtA = n => n===0 ? '—' : '₹'+Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

  /* ═══════ BUILD EACH FORM SECTION ═══════ */

  /* ── FORM 02 ── */
  let f02Sect = '', f02rowCount = 0;
  if(incF02){
    const rows = [...f02.filter(e=>dateMatches(e.date)),
                  ...f02Pending.filter(e=>dateMatches(e.date)&&e.status==='approved')];
    f02rowCount = rows.length;
    if(rows.length){
      const cols = f02AllCols();
      const thd  = ['#','Date','Receipt No',...cols.map(c=>c.ml),'Total','Remarks']
                    .map(h=>`<th>${h}</th>`).join('');
      const trs  = rows.map((e,i)=>{
        const tot   = f02Total(e);
        const cells = cols.map(c=>`<td class="pr-num">${parseFloat(e[c.key])||0?fmtA(parseFloat(e[c.key])):'—'}</td>`).join('');
        return `<tr><td class="pr-num">${i+1}</td><td>${e.date||'—'}</td><td>${e.receiptNo||'—'}</td>${cells}<td class="pr-num pr-total">${fmtA(tot)}</td><td>${e.remarks||'—'}</td></tr>`;
      });
      const gt = rows.reduce((s,e)=>s+f02Total(e),0);
      f02Sect = `<div class="pr-form-body"><table class="pr-tbl"><thead><tr>${thd}</tr></thead><tbody>
        ${trs.join('')}
        <tr class="pr-grand-row"><td colspan="${3+cols.length}" style="text-align:right">ആകെ — Grand Total</td><td class="pr-num pr-total">${fmtA(gt)}</td><td></td></tr>
      </tbody></table></div>`;
    } else {
      f02Sect = `<div class="pr-empty">ഈ കാലയളവിലെ വരവ് വിവരങ്ങൾ ലഭ്യമല്ല<br><small>No income entries for the selected period</small></div>`;
    }

  /* ── FORM 03 ── */
  let f03Sect = '', f03rowCount = 0;
  if(incF03){
    const rows = [...f03.filter(e=>dateMatches(e.date)),
                  ...f03Pending.filter(e=>dateMatches(e.date)&&e.status==='approved')];
    f03rowCount = rows.length;
    if(rows.length){
      const cols = f03AllCols();

      ];
      const payTrs = [
        ...ap.map(p=>`<tr><td>${p.date}</td><td>${p.voucher||'—'}</td><td>${p.desc} <span style="font-size:.58rem;background:#ffe0e0;color:#6b1a1a;border-radius:2px;padding:0 3px">F03</span></td><td class="pr-num pr-total-pay">${fmtA(p.cash)}</td><td>—</td><td>—</td></tr>`),

    } else {
      f01Sect = `<div class="pr-empty">ഈ കാലയളവിലെ ക്യാഷ് ബുക്ക് വിവരങ്ങൾ ലഭ്യമല്ല<br><small>No Cash Book entries for the selected period</small></div>`;

        <div class="pr-no-data-en">No data found for "${dateLabel}" in any selected form.</div>
      </div>`;

  if(printBtn) printBtn.style.display = hasAny ? 'inline-flex' : 'none';
}


function buildTabBar(){
  const bar = document.getElementById('tab-bar');
  let tabs;

  if(isAdmin){
    /* Admin (isAdmin:true) — show all tabs including ⚙️ Admin */
    tabs = ALL_TABS;
  } else {
    /* Regular user — filter to:
         a) only non-admin-only tabs
         b) only tabs whose formIdx is in the user's assigned forms[]
       The Admin tab is completely absent from the resulting array,
       so it never appears in the rendered HTML at all. */
    const allowed = currentUser ? (currentUser.forms || []) : [];
    tabs = ALL_TABS.filter(t => !t.adminOnly && t.formIdx !== null && allowed.includes(t.formIdx));
    /* Fallback: if no forms assigned, show Form 02 only */
    if(!tabs.length) tabs = [{label:'Form 02 — Income', idx:1, formIdx:1, adminOnly:false}];
  }

  bar.innerHTML = tabs.map(t=>`<div class="tab-item" onclick="switchTabByIdx(${t.idx})" data-idx="${t.idx}">${t.label}${
    t.idx===0 && isAdmin ? `<span class="tab-badge" id="pending-badge" style="display:none">0</span>` : ''
  }</div>`).join('');

  updatePendingBadge();
}

function updatePendingBadge(){
  const badge = document.getElementById('pending-badge'); if(!badge) return;
  const count = f02Pending.filter(e=>e.status==='pending').length
              + f03Pending.filter(e=>e.status==='pending').length;
  badge.textContent = count;
  badge.style.display = count ? 'inline-block' : 'none';
}

function switchTabByIdx(idx){
  /* ── Server-side access guard (second line of defence) ────────────────
     Even if someone crafts a direct switchTabByIdx(5) call in the console,
     they still cannot reach Admin unless isAdmin is true on the session.   */
  if(!isAdmin){
    /* Block Admin tab outright */
    if(idx === 6){
      showToast('Access denied — Admin only.', '#a32d2d');
      return;
    }
    /* Block any tab not in the user's assigned forms[] */
    const allowed = currentUser ? (currentUser.forms || []) : [];
    const tabMeta = ALL_TABS.find(t => t.idx === idx);
    if(tabMeta && tabMeta.formIdx !== null && !allowed.includes(tabMeta.formIdx)){
      showToast('You do not have permission for this form.', '#a32d2d');
      return;
    }
  }

  /* Highlight the active tab */
  document.querySelectorAll('.tab-item').forEach(t=>{
    t.classList.toggle('active', parseInt(t.dataset.idx) === idx);
  });

  /* Render the correct view */
  const renders = {0:renderF01, 1:renderF02, 2:renderF03, 3:renderF04, 4:renderFinal, 5:renderPrintReports, 6:renderAdmin};
  if(idx === 4 && _finalDirty){
    /* Final tab: re-render immediately if data changed elsewhere */
    renderFinal();
    _finalDirty = false;
  } else if(renders[idx]){
    renders[idx]();
  }

  /* Admin-only: wire contentEditable on display cells after render */
  if(isAdmin) setTimeout(applyAdminEdit, 80);
}

/* ══════════════════════════════════════════════════════
   DATA SYNC ENGINE
   _syncAll() is the single source of truth. Call it after
   ANY mutation to a backing array. It:
   1. Recalculates F01 totals in the DOM (if on F01 tab)
   2. Re-renders the Final Statement immediately if that tab is active
   3. Sets _finalDirty so the Final tab re-renders fresh on next visit
══════════════════════════════════════════════════════ */
let _finalDirty = false;

function _syncAll(){
  /* Always refresh F01 totals widget if rendered */
  refreshF01Totals();
  /* Mark Final Statement stale */
  _finalDirty = true;
  /* Immediately re-render Final if it's the active tab */
  const activeTab = document.querySelector('.tab-item.active');
  if(activeTab && parseInt(activeTab.dataset.idx) === 4){
    renderFinal();
    _finalDirty = false;
  }
}

/* Back-compat alias — kept for any legacy call-sites */
function _autoSyncFinal(){ _syncAll(); }

/* Admin can directly edit any table cell value.
   On blur the new value is captured, the backing array is
   updated, and all relevant totals are recalculated.
   ─────────────────────────────────────────────────────
   Handles four cell types:
   1. data-ce-auto="form|entryId|field"  — auto rows from F02/F03 approved
   2. data-ce-rec="id|field"             — F01 manual receipt rows
   3. data-ce-pay="id|field"             — F01 manual payment rows
   4. id="f02rt-*" / id="f03rt-*"       — row-total display cells       */
function applyAdminEdit(){
  /* Input fields (f-inp, cb-inp, f04-inp) are live-bound via oninput */

  /* Wire all read-only display cells */
  document.querySelectorAll(
    '.cb-auto-cell,[data-ce-auto],.tbl-read-cell,.cb-amount-cell,.cb-amount-cell-pay,.f02-total-cell,.f03-total-cell,.f04-amount-cell'
  ).forEach(el=>{
    if(el.dataset.adminEdit) return;
    el.dataset.adminEdit = '1';
    el.contentEditable = 'true';
    el.style.outline = '1px dashed #ffc947';
    el.style.cursor = 'text';
    el.title = 'Admin: click to edit (saves on blur)';

    el.addEventListener('blur', function(){
      /* Strip any badge text (e.g. "F02" / "F03" span text) from innerText */
      const newVal = (this.dataset.ceAuto && this.dataset.ceAuto.endsWith('|desc'))
        ? (this.childNodes[0] ? this.childNodes[0].textContent.trim() : this.innerText.trim())
        : this.innerText.trim();

      /* ── Auto-rows: F02/F03 approved entries displayed in Cash Book ── */
      if(this.dataset.ceAuto){
        const parts = this.dataset.ceAuto.split('|');
        const form = parts[0], eid = parseFloat(parts[1]), field = parts[2];
        if(form === 'f02'){
          const e = f02Pending.find(x => x.id === eid);
          if(e){
            const numVal = parseFloat(newVal.replace(/[₹,]/g,''));
            e[field] = isNaN(numVal) ? newVal : numVal;
            lsSet(LS.F02_PENDING, f02Pending);
            renderF01();
            _syncAll();
          }
        } else if(form === 'f03'){
          const e = f03Pending.find(x => x.id === eid);
          if(e){
            const numVal = parseFloat(newVal.replace(/[₹,]/g,''));
            e[field] = isNaN(numVal) ? newVal : numVal;
            lsSet(LS.F03_PENDING, f03Pending);
            renderF01();
            _syncAll();
          }
        }
        return;
      }

      /* ── F01 manual receipt cells ── */
      if(this.dataset.ceRec){
        const [sid, field] = this.dataset.ceRec.split('|');
        const r = f01ManualRec.find(x => String(x.id) === sid);
        if(r){
          const numVal = parseFloat(newVal.replace(/[₹,]/g,''));
          r[field] = isNaN(numVal) ? newVal : numVal;
          lsSet(LS.F01_REC, f01ManualRec);
          _syncAll();
        }
        return;
      }

      /* ── F01 manual payment cells ── */
      if(this.dataset.cePay){
        const [sid, field] = this.dataset.cePay.split('|');
        const p = f01ManualPay.find(x => String(x.id) === sid);
        if(p){
          const numVal = parseFloat(newVal.replace(/[₹,]/g,''));
          p[field] = isNaN(numVal) ? newVal : numVal;
          lsSet(LS.F01_PAY, f01ManualPay);
          _syncAll();
        }
        return;
      }

      /* ── F02 row-total display cells ── */
      if(this.id && this.id.startsWith('f02rt-')){
        const eid = parseFloat(this.id.replace('f02rt-',''));
        const e = f02.find(x => x.id === eid);
        if(e){
          const numVal = parseFloat(newVal.replace(/[₹,]/g,'')) || 0;
          /* Write into the first non-zero col, or first col if all empty */
          const cols = f02AllCols().filter(c => parseFloat(e[c.key]) > 0);
          const targetCol = cols.length ? cols[0] : f02AllCols()[0];
          if(targetCol){ e[targetCol.key] = numVal; lsSet(LS.F02, f02); }
          renderF02(); _syncAll();
        }
        return;
      }

      /* ── F03 row-total display cells ── */
      if(this.id && this.id.startsWith('f03rt-')){
        const eid = parseFloat(this.id.replace('f03rt-',''));
        const e = f03.find(x => x.id === eid);
        if(e){
          const numVal = parseFloat(newVal.replace(/[₹,]/g,'')) || 0;
          const cols = f03AllCols().filter(c => parseFloat(e[c.key]) > 0);
          const targetCol = cols.length ? cols[0] : f03AllCols()[0];
          if(targetCol){ e[targetCol.key] = numVal; lsSet(LS.F03, f03); }
          renderF03(); _syncAll();
        }
        return;
      }
    });
  });
}

/* ══════════════════════════════════════════════════════
   PRINT ORIENTATION HELPERS
   printFinal()  → adds .print-portrait to body, triggers print
   printForm()   → adds .print-landscape to body, triggers print
   Both clean up the class after the print dialog closes.
══════════════════════════════════════════════════════ */
function _doPrint(cls){
  document.body.classList.remove('print-portrait','print-landscape');
  document.body.classList.add(cls);
  window.print();
  /* Remove class after browser print dialog completes */
  setTimeout(()=>document.body.classList.remove(cls),1000);
}
function printFinal(){ _doPrint('print-portrait'); }
function printForm(){  _doPrint('print-landscape'); }

/* ══════════════════════════════════════════════════════
   KERALA GOVERNMENT FORMAT — Portrait Final Statement
   Uses EXACTLY the same calculation path as renderFinal()
   so all figures are guaranteed to be identical.
   Key principle: call aggregateF01() once, derive every
   number from its output — no secondary recalculation.
══════════════════════════════════════════════════════ */
function buildFinalPortraitHTML(dateLabel){
  const fmtA=n=>n===0?'—':'₹'+Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fy=getFinancialYear();

  /* ── Step 1: same aggregation as renderFinal() ── */
  const {recMap,payMap}=aggregateF01();
  const recKeys=Object.keys(recMap);
  const payKeys=Object.keys(payMap);

  /* ── Step 2: same totals as renderFinal() ── */
  const totRC=recKeys.reduce((s,k)=>s+recMap[k].cash,0);
  const totRT=recKeys.reduce((s,k)=>s+recMap[k].treasury,0);
  const totRB=recKeys.reduce((s,k)=>s+recMap[k].bank,0);
  const totRec=totRC+totRT+totRB;          /* = ആകെ വരവ് in Final Report */

  const totPC=payKeys.reduce((s,k)=>s+payMap[k].cash,0);
  const totPT=payKeys.reduce((s,k)=>s+payMap[k].treasury,0);
  const totPB=payKeys.reduce((s,k)=>s+payMap[k].bank,0);
  const totPay=totPC+totPT+totPB;          /* = ആകെ ചെലവ് in Final Report */

  /* ── Step 3: closing balances — same formula as renderFinal() ── */
  const closC=totRC-totPC;  /* Cash Balance   — matches Final Report */
  const closT=totRT-totPT;  /* Treasury Balance */
  const closB=totRB-totPB;  /* Bank Balance    — matches Final Report */
  const closing=closC+closT+closB;         /* = Closing Balance in Final Report */

  /* ── Step 4: Opening Balance (already inside recMap, shown separately) ── */
  const OB_KEY='ആരംഭ ബാക്കി (Opening Balance)';
  const obEntry=recMap[OB_KEY];
  const obTotal=obEntry?(obEntry.cash+obEntry.treasury+obEntry.bank):0;

  /* ── Step 5: Build income rows (exclude OB — shown separately) ── */
  const incRows=recKeys
    .filter(k=>k!==OB_KEY)
    .map(k=>({label:k, amt:recMap[k].cash+recMap[k].treasury+recMap[k].bank}))
    .filter(r=>r.amt!==0);

  /* ── Step 6: Build expenditure rows ── */
  const expRows=payKeys
    .map(k=>({label:k, amt:payMap[k].cash+payMap[k].treasury+payMap[k].bank}))
    .filter(r=>r.amt!==0);

  /* Pad to equal length */
  const maxR=Math.max(incRows.length,expRows.length,1);
  const incPad=[...incRows,...Array(Math.max(0,maxR-incRows.length)).fill({label:'',amt:0})];
  const expPad=[...expRows,...Array(Math.max(0,maxR-expRows.length)).fill({label:'',amt:0})];

  /* Build body rows */
  const bodyRows=incPad.map((r,i)=>{
    const e=expPad[i];
    return `<tr>
      <td class="pr-fpt-lbl">${r.label||''}</td>
      <td class="pr-fpt-amt">${r.amt?fmtA(r.amt):''}</td>
      <td class="pr-fpt-lbl">${e.label||''}</td>
      <td class="pr-fpt-amt">${e.amt?fmtA(e.amt):''}</td>
    </tr>`;
  }).join('');

  return `<div class="pr-final-portrait-wrap">
    <div class="pr-final-p-org">${org.name||'HMC'}</div>
    <div class="pr-final-p-title">${fy.start}-${String(fy.end).slice(-2)} വർഷത്തെ വരവ്‌ ചെലവ് കണക്ക്</div>
    <div class="pr-final-p-sub">${dateLabel||'Financial Year: Apr '+fy.start+' – Mar '+fy.end}</div>

    <table class="pr-final-portrait-tbl">
      <thead>
        <tr>
          <th colspan="2" class="pr-fpt-side-hdr" style="width:50%">വരവ് (Receipts)</th>
          <th colspan="2" class="pr-fpt-side-hdr" style="width:50%">ചെലവ് (Expenditure)</th>
        </tr>
        <tr>
          <th style="width:34%;text-align:left;padding-left:.6rem">ഇനം (Particulars)</th>
          <th style="width:16%;text-align:right">തുക (₹)</th>
          <th style="width:34%;text-align:left;padding-left:.6rem">ഇനം (Particulars)</th>
          <th style="width:16%;text-align:right">തുക (₹)</th>
        </tr>
      </thead>
      <tbody>
        <!-- Opening Balance (മുന്നിരുപ്പ്) — from recMap, same as Final Report -->
        ${obTotal?`<tr>
          <td class="pr-fpt-lbl" style="font-style:italic;color:#444">മുന്നിരുപ്പ് (Opening Balance)</td>
          <td class="pr-fpt-amt">${fmtA(obTotal)}</td>
          <td class="pr-fpt-lbl"></td><td></td>
        </tr>`:''}

        <!-- Section header: സാധാരണം -->
        <tr>
          <td colspan="2" class="pr-fpt-section-hdr">സാധാരണം (Ordinary)</td>
          <td colspan="2" class="pr-fpt-section-hdr">സാധാരണം (Ordinary)</td>
        </tr>

        <!-- Data rows — sourced directly from recMap / payMap, same as renderFinal() -->
        ${bodyRows}

        <!-- Grand Total — totRec matches ആകെ വരവ് in Final Report tab -->
        <tr class="pr-fpt-total">
          <td class="pr-fpt-lbl" style="font-weight:700">ആകെ (Grand Total)</td>
          <td class="pr-fpt-amt">${fmtA(totRec)}</td>
          <td class="pr-fpt-lbl" style="font-weight:700">ആകെ (Grand Total)</td>
          <td class="pr-fpt-amt">${fmtA(totPay)}</td>
        </tr>

        <!-- Closing Balance row (നീക്കിയിരുപ്പ്) -->
        <tr class="pr-fpt-closing">
          <td colspan="2" style="padding:.2rem .55rem"></td>
          <td class="pr-fpt-lbl" style="font-weight:700;color:#1a3d0f">നീക്കിയിരുപ്പ് (Closing Balance)</td>
          <td class="pr-fpt-amt" style="color:#1a3d0f;font-weight:700">${fmtA(Math.abs(closing))}</td>
        </tr>

        <!-- Cash / Bank breakdown:
             closC = Cash Balance from Final Report summary box
             closB = Bank Balance from Final Report summary box -->
        <tr class="pr-fpt-cash-bank">
          <td colspan="2"></td>
          <td class="pr-fpt-lbl" colspan="2">
            <span style="display:inline-block;width:48%;vertical-align:top">
              <strong>പണം (Cash):</strong><br>
              <span style="font-size:.88rem;font-weight:700">${fmtA(Math.abs(closC))}</span>
            </span>
            <span style="display:inline-block;width:48%;vertical-align:top">
              <strong>ബാങ്ക് (Bank):</strong><br>
              <span style="font-size:.88rem;font-weight:700">${fmtA(Math.abs(closB))}</span>
            </span>
          </td>
        </tr>

        <!-- Balance-check footer: Receipt Total = Payment + Balance -->
        <tr style="background:#f0f0f0">
          <td class="pr-fpt-lbl" colspan="2" style="color:#444;font-size:.68rem;text-align:right;font-style:italic">
            ആകെ വരവ് = ${fmtA(totRec)}
          </td>
          <td class="pr-fpt-lbl" colspan="2" style="color:#444;font-size:.68rem;text-align:right;font-style:italic">
            ചെലവ് + ബാക്കി = ${fmtA(totPay+Math.abs(closing))}
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Signature row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2rem;margin-top:1.5rem;padding-top:.85rem">
      <div style="border-top:1px solid #555;padding-top:.38rem;font-size:.68rem;color:#555;text-align:center;font-family:'Public Sans',sans-serif">
        തയ്യാറാക്കിയത്<br><strong>${org.adminName||'_______________'}</strong><br>${org.designation||''}<br>PEN: ${org.pen||'—'}
      </div>
      <div style="border-top:1px solid #555;padding-top:.38rem;font-size:.68rem;color:#555;text-align:center;font-family:'Public Sans',sans-serif">
        പരിശോധിച്ചത്<br><br><br>തീയതി: ___________
      </div>
      <div style="border-top:1px solid #555;padding-top:.38rem;font-size:.68rem;color:#555;text-align:center;font-family:'Public Sans',sans-serif">
        ഓഡിറ്ററുടെ ഒപ്പ്<br><br><br>തീയതി: ___________
      </div>
    </div>
  </div>`;
}
